[flake8]
max-line-length = 140
exclude =
    .git,
    __pycache__,
    application/migrations,
    ../app_env

[coverage:run]
source = application
omit =
    application/admin.py
    application/apps.py
    application/migrations/*
    application/tests.py

[coverage:report]
fail_under = 100
show_missing = True
skip_covered = True
